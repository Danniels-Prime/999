name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expo-app/package-lock.json

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: expo-app
        run: npm install

      - name: Expo prebuild (Android)
        working-directory: expo-app
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        working-directory: expo-app/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: expo-app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: find_apk
        working-directory: expo-app
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Get version
        id: version
        working-directory: expo-app
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD=$(node -p "require('./app.json').expo.android.versionCode")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}
          name: OverlayLang v${{ steps.version.outputs.version }}
          body: |
            ## OverlayLang v${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})

            ### Install
            Download the APK below and install it on your Android device.
            You may need to enable "Install from unknown sources" in your device settings.

            ### What's included
            - EN↔ES translation (offline fallback + MyMemory API)
            - IPA phonetics for English words (Wiktionary)
            - Voice input via Deepgram Nova-2 (API key required)
            - Optional Supabase sync for history
          files: expo-app/${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
